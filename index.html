<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa de Satisfação - Bike Shop</title>
    <style>
        :root {
            --brazil-green: #009739;
            --brazil-yellow: #FFDF00;
            --brazil-blue: #002776;
            --bg-light: #f4f7f6;
            --text-dark: #333;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .form-container {
            background: var(--white);
            max-width: 500px;
            width: 100%;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-top: 8px solid var(--brazil-green);
        }

        h1 {
            color: var(--brazil-blue);
            font-size: 24px;
            margin-bottom: 10px;
            text-align: center;
        }

        p.subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .question {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 20px;
            display: block;
            color: var(--text-dark);
        }

        .options-grid {
            display: grid;
            gap: 15px;
        }

        .option-card {
            border: 2px solid #eee;
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            position: relative;
        }

        .option-card:hover {
            border-color: var(--brazil-yellow);
            background-color: #fffef0;
            transform: translateY(-2px);
        }

        .option-card input[type="radio"] {
            display: none;
        }

        .option-card label {
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            font-weight: 500;
        }

        .icon {
            font-size: 24px;
            margin-right: 15px;
        }

        /* Estado Selecionado */
        input[type="radio"]:checked + label {
            color: var(--brazil-blue);
        }

        input[type="radio"]:checked ~ .option-card, 
        .option-card.active {
            border-color: var(--brazil-green);
            background-color: #e8f5e9;
            box-shadow: 0 4px 12px rgba(0,151,57,0.15);
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background-color: var(--brazil-blue);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            margin-top: 30px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-submit:hover {
            background-color: #001a50;
            box-shadow: 0 5px 15px rgba(0,39,118,0.3);
        }

        .app-preview {
            width: 100%;
            height: 150px;
            background: #eee url('https://via.placeholder.com/400x150?text=Sua+Loja+de+Bikes') center/cover;
            border-radius: 10px;
            margin-bottom: 25px;
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="app-preview"></div>
    <h1>Pesquisa de Satisfação</h1>
    <p class="subtitle">Loja de Bicicletas - Copa do Mundo 2026</p>
    
    <form action="#">
        <span class="question">Você indicaria o aplicativo para outra pessoa? *</span>
        
        <div class="options-grid">
            <div class="option-card" onclick="selectOption(this)">
                <input type="radio" id="sim" name="indicacao" value="sim">
                <label for="sim"><span class="icon">🚴‍♂️</span> Sim, com certeza!</label>
            </div>

            <div class="option-card" onclick="selectOption(this)">
                <input type="radio" id="nao" name="indicacao" value="nao">
                <label for="nao"><span class="icon">🛑</span> Não indicaria</label>
            </div>

            <div class="option-card" onclick="selectOption(this)">
                <input type="radio" id="ressalvas" name="indicacao" value="ressalvas">
                <label for="ressalvas"><span class="icon">⚠️</span> Indicaria, mas com ressalvas</label>
            </div>

            <div class="option-card" onclick="selectOption(this)">
                <input type="radio" id="mudancas" name="indicacao" value="mudancas">
                <label for="mudancas"><span class="icon">🛠️</span> Indicaria após mudanças</label>
            </div>
        </div>

        <button type="submit" class="btn-submit">ENVIAR FEEDBACK</button>
    </form>
</div>

<script>
    function selectOption(element) {
        // Remove classe active de todos
        document.querySelectorAll('.option-card').forEach(card => {
            card.classList.remove('active');
            card.style.borderColor = '#eee';
            card.style.backgroundColor = '#fff';
        });
        
        // Adiciona ao selecionado
        element.classList.add('active');
        element.style.borderColor = '#009739'; // Verde
        element.style.backgroundColor = '#e8f5e9';
        
        // Marca o radio button interno
        element.querySelector('input').checked = true;
    }
</script>

</body>
</html>
